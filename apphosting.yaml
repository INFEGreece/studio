# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # To stay within the free tier limits of Google Cloud (which powers App Hosting),
  # we limit the number of active instances to 1.
  maxInstances: 1
  # Memory limit for the server-side rendering (1GB is usually sufficient for this app)
  memory: 1024MiB
